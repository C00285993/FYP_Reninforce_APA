version: '3.8'

# AI Pentest Assistant - Docker Environment
# DVWA runs in an isolated network. No internet access for the target.

services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa_target
    ports:
      - "8080:80"
    environment:
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=p@ssw0rd
      - MYSQL_ROOT_PASSWORD=rootpass
    networks:
      - pentest_lab
    restart: unless-stopped
    # SAFETY: No internet access for the vulnerable target
    # Only accessible within the pentest_lab network and via localhost:8080

  juiceshop:
    image: bkimminich/juice-shop
    container_name: juiceshop_target
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=unsafe
    networks:
      - pentest_lab
    restart: unless-stopped

  webgoat:
    image: webgoat/webgoat
    container_name: webgoat_target
    ports:
      - "8081:8080"   # WebGoat UI
    networks:
      - pentest_lab
    restart: unless-stopped

networks:
  pentest_lab:
    driver: bridge
    internal: false  # Set to true to fully isolate (no host access either)
    ipam:
      config:
        - subnet: 172.28.0.0/16
